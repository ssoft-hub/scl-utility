name: Documentation

on:
  push:
    branches: [main]
    tags: ['v[0-9]*']

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz python3 python-is-python3

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Deploy versioned docs
        run: sh script/ci/deploy_versioned_docs.sh gh-pages
