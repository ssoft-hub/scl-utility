name: Documentation

on:
  push:
    branches: [dev]
    tags: ['v[0-9]*']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      GIT_DISCOVERY_ACROSS_FILESYSTEM: 1
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm git ca-certificates

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: git config --global --add safe.directory '*'

      - name: Fetch tags
        run: git fetch --prune --tags

      - name: Install dependencies
        run: pacman -S --noconfirm doxygen graphviz python

      - name: Build versioned docs
        run: sh script/ci/deploy_versioned_docs.sh public

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
