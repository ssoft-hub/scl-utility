stages: [lint, publish]

variables:
  SCL_SRC_DIR: src

clang-tidy:
  stage: lint
  image: silkeh/clang:21
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|dev)$/
  script:
    - |
      find $SCL_SRC_DIR \( -name '*.h' -o -name '*.hpp' \) | while IFS= read -r f; do
        clang-tidy "$f" --quiet --warnings-as-errors='*' -- -std=c++20 -xc++ -I$SCL_SRC_DIR || exit 1
      done

clang-format:
  stage: lint
  image: silkeh/clang:21
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|dev)$/
  script:
    - find $SCL_SRC_DIR -name '*.h' -o -name '*.hpp' | xargs clang-format
        --dry-run
        --Werror

cppcheck:
  stage: lint
  image: ubuntu:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH =~ /^(main|dev)$/
  before_script:
    - apt-get update && apt-get install -y cppcheck
    - cppcheck --version
  script:
    - |
      find $SCL_SRC_DIR \( -name '*.h' -o -name '*.hpp' \) -exec cppcheck \
        --enable=warning,style,performance,portability \
        --std=c++20 \
        --language=c++ \
        --inline-suppr \
        --error-exitcode=1 \
        --suppress=missingIncludeSystem \
        --suppress=unusedFunction \
        -I$SCL_SRC_DIR \
        -UDOXYGEN \
        {} +

# ---------------------
# Documentation
# ---------------------
pages:
  stage: publish
  image: debian:bookworm-slim
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v[0-9]/
  before_script:
    - apt-get update -qq && apt-get install -y -qq doxygen graphviz python3 python-is-python3 git ca-certificates
    - git config user.email "${GITLAB_USER_EMAIL:-ci@gitlab}"
    - git config user.name "${GITLAB_USER_NAME:-CI}"
    - git remote set-url origin "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - sh script/ci/deploy_versioned_docs.sh pages
    - git fetch origin pages:pages
    - mkdir -p public
    - git archive pages | tar -x -C public
  artifacts:
    paths:
      - public

# ---------------------
# Mirror to GitHub
# ---------------------
mirror:github:
  stage: publish
  image:
      name: alpine/git
      entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
    # Set in GitLab CI/CD group variables (ssoft-scl):
    #   GITHUB_TOKEN       - GitHub PAT with Contents: Write (masked)
    # Set in GitLab CI/CD project variables:
    #   GITHUB_MIRROR_URL  - https://github.com/ssoft-hub/scl-utility.git
  script:
    - sh script/ci/mirror_github.sh
